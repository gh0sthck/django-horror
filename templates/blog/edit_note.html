{% extends "base.html" %}

{% block title %}
Добавить запись в блог
{% endblock title %}

{% block main %}
<div class="blog_edit">
    {% if not request.user.is_staff %}
        {{ form.delete_news }}
    {% endif %}
    
    <form method="post" class="blog_edit__form" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Подтвердить">
    </form>
</div>
{% endblock main %}
