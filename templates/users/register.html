{% extends "base.html" %}

{% block title %}Новый аккаунт{% endblock title %}

{% block main %}
<div class="register">
    <div class="register__container">
        <h2>Регистрация</h2>

        <form style="display: flex; flex-direction: column;" method="post" enctype="multipart/form-data">
            {{ form.as_p }}
            {% csrf_token %}
            <input style="align-self: center;" type="submit" value="Создать аккаунт">
        </form>
    </div>    
</div>
{% endblock main %}
