{% extends "base.html" %}

{% block title %}
Редактирование профиля
{% endblock title %}

{% block main %}
<div class="profile">
    <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="profile__header">
        <div class="profile__header-image">
            <img 
            style="
                width: 150px; 
                height: 150px; 
                border-radius: 100%;
                {% if user.is_active %}
                    border: 3px solid #b994d4ff;
                {% endif %}
            "
            src="{{ user.avatar.url }}" 
            alt="Profile image"/>
        </div>

        {{ form.avatar }}

        <div class="profile__header-info">
            {{ form.username }}

            <span style="font-size: 14px;" class="profile__header-regdate">
                {{ form.birthday }}
            </span>

            <p style="margin-top: 5px;" class="profile__status-text">
                {{ form.status }}
            </p>

            <input type="submit" value="Сохранить">

            <a style="text-decoration: none;     
            border: 1px solid #875ca7;
            color: #875ca7;
            background: none;
            border-radius:5px;
            padding: 7px 15px; " 
            href="{% url "us_delete" form.username.value %}">Удалить профиль</a>

            
        </div>

    </div>

    <div class="profile__body">
       <div class="profile__body-content">
            {{ form.bio }}
       </div>  

        <div class="profile__body-navigation">
            
        </div>
    </div>
        
    </form>
</div>
{% endblock main %}
